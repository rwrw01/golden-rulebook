<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angel Investor Pitch Evaluator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafafa; --surface: #ffffff; --border: #e0e0e0;
      --text: #212121; --muted: #757575; --accent: #1565c0;
      --accent-hover: #1976d2; --danger: #c62828; --success: #2e7d32;
      --radius: 4px; --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.1);
    }
    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh;
      display: flex; flex-direction: column;
    }
    header {
      padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow);
    }
    header h1 { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
      display: inline-block; margin-right: 8px;
    }
    .status-dot.ok { background: var(--success); }
    .status-dot.err { background: var(--danger); }
    #setup-panel {
      max-width: 520px; margin: 80px auto; padding: 32px;
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow-lg);
    }
    #setup-panel h2 { margin-bottom: 8px; font-size: 20px; font-weight: 600; }
    #setup-panel p { color: var(--muted); margin-bottom: 20px; font-size: 14px; line-height: 1.6; }
    .install-cmd {
      background: #f5f5f5; padding: 12px 16px; border-radius: var(--radius);
      font-family: 'Consolas', 'Monaco', monospace; font-size: 13px; margin-bottom: 16px;
      border: 1px solid var(--border); user-select: all; color: var(--text);
    }
    #chat-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    #start-panel {
      display: none; max-width: 560px; margin: 60px auto; padding: 32px;
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow-lg);
    }
    #start-panel h2 { margin-bottom: 16px; font-weight: 600; }
    .mode-group { display: flex; gap: 10px; margin-bottom: 20px; }
    .mode-btn {
      flex: 1; padding: 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); cursor: pointer;
      font-size: 13px; text-align: left; transition: all 0.15s;
    }
    .mode-btn:hover { border-color: var(--accent); box-shadow: var(--shadow); }
    .mode-btn.active { border-color: var(--accent); background: #e3f2fd; }
    .mode-btn strong { display: block; margin-bottom: 4px; font-size: 14px; }
    .mode-btn span { color: var(--muted); font-size: 12px; line-height: 1.4; }
    textarea {
      width: 100%; min-height: 120px; padding: 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: inherit; font-size: 14px;
      resize: vertical; margin-bottom: 16px; line-height: 1.5;
    }
    textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(21,101,192,0.15); }
    button {
      padding: 10px 24px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); cursor: pointer;
      font-size: 14px; font-weight: 500; transition: background 0.15s;
      letter-spacing: 0.2px;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 12px;
      background: var(--bg);
    }
    .msg {
      max-width: 80%; padding: 12px 16px; border-radius: var(--radius);
      font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
      box-shadow: var(--shadow);
    }
    .msg.assistant { background: var(--surface); align-self: flex-start; border: 1px solid var(--border); }
    .msg.user { background: #e3f2fd; align-self: flex-end; color: var(--text); }
    .msg.system { background: transparent; color: var(--muted); align-self: center; font-size: 12px; box-shadow: none; }
    .input-bar {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; background: var(--surface);
    }
    .input-bar input {
      flex: 1; padding: 10px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 14px;
    }
    .input-bar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(21,101,192,0.15); }
    #pdf-bar {
      display: none; padding: 12px 24px; border-top: 1px solid var(--border);
      text-align: center; background: var(--surface);
    }
    #pdf-bar button { background: var(--success); }
    #pdf-bar button:hover { background: #388e3c; }
  </style>
</head>
<body>
  <header>
    <h1>Angel Investor Pitch Evaluator</h1>
    <div><span class="status-dot" id="status-dot"></span><span id="status-text">Checking...</span></div>
  </header>

  <div id="setup-panel">
    <h2>Setup Required</h2>
    <p id="setup-msg">Checking Claude Code installation...</p>
    <div class="install-cmd" id="install-cmd" style="display:none"></div>
    <button onclick="checkStatus()">Retry</button>
  </div>

  <div id="start-panel">
    <h2>Start Evaluation</h2>
    <p style="color:var(--muted);margin-bottom:12px;font-size:14px;">Choose your evaluation mode:</p>
    <div class="mode-group">
      <button class="mode-btn" data-mode="sparring" onclick="selectMode(this)">
        <strong>Sparring</strong><span>Raw interrogation. No coaching. Weakest branch first.</span>
      </button>
      <button class="mode-btn" data-mode="coaching" onclick="selectMode(this)">
        <strong>Coaching</strong><span>Challenges + thinking angles when stuck.</span>
      </button>
      <button class="mode-btn active" data-mode="masterclass" onclick="selectMode(this)">
        <strong>Masterclass</strong><span>Full depth. Challenge, coach, and teach.</span>
      </button>
    </div>
    <textarea id="pitch-input" placeholder="Paste your pitch here, or just describe your idea verbally..."></textarea>
    <button onclick="startSession()" id="start-btn">Start Evaluation</button>
  </div>

  <div id="chat-panel">
    <div class="messages" id="messages"></div>
    <div id="pdf-bar">
      <button onclick="downloadPdf()">Download Investment Memo (PDF)</button>
    </div>
    <div class="input-bar">
      <input type="text" id="chat-input" placeholder="Your answer..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()" id="send-btn">Send</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
