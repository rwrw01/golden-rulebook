<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angel Investor Pitch Evaluator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --text: #e4e4e7; --muted: #8b8d97; --accent: #6366f1;
      --accent-hover: #818cf8; --danger: #ef4444; --success: #22c55e;
      --radius: 8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh;
      display: flex; flex-direction: column;
    }
    header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
      display: inline-block; margin-right: 8px;
    }
    .status-dot.ok { background: var(--success); }
    .status-dot.err { background: var(--danger); }
    #setup-panel {
      max-width: 520px; margin: 80px auto; padding: 32px;
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    #setup-panel h2 { margin-bottom: 8px; font-size: 20px; }
    #setup-panel p { color: var(--muted); margin-bottom: 20px; font-size: 14px; line-height: 1.5; }
    .install-cmd {
      background: var(--bg); padding: 12px 16px; border-radius: var(--radius);
      font-family: monospace; font-size: 13px; margin-bottom: 16px;
      border: 1px solid var(--border); user-select: all;
    }
    #chat-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    #start-panel {
      display: none; max-width: 520px; margin: 80px auto; padding: 32px;
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    #start-panel h2 { margin-bottom: 16px; }
    .mode-group { display: flex; gap: 8px; margin-bottom: 20px; }
    .mode-btn {
      flex: 1; padding: 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); cursor: pointer;
      font-size: 13px; text-align: left; transition: border-color 0.15s;
    }
    .mode-btn:hover { border-color: var(--accent); }
    .mode-btn.active { border-color: var(--accent); background: rgba(99,102,241,0.1); }
    .mode-btn strong { display: block; margin-bottom: 4px; }
    .mode-btn span { color: var(--muted); font-size: 12px; }
    textarea {
      width: 100%; min-height: 120px; padding: 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: inherit; font-size: 14px;
      resize: vertical; margin-bottom: 16px;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    button {
      padding: 10px 20px; background: var(--accent); color: white;
      border: none; border-radius: var(--radius); cursor: pointer;
      font-size: 14px; font-weight: 500; transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .msg {
      max-width: 80%; padding: 12px 16px; border-radius: var(--radius);
      font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    }
    .msg.assistant { background: var(--surface); align-self: flex-start; }
    .msg.user { background: rgba(99,102,241,0.15); align-self: flex-end; }
    .msg.system { background: transparent; color: var(--muted); align-self: center; font-size: 12px; }
    .input-bar {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .input-bar input {
      flex: 1; padding: 10px 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 14px;
    }
    .input-bar input:focus { outline: none; border-color: var(--accent); }
    #pdf-bar {
      display: none; padding: 12px 24px; border-top: 1px solid var(--border);
      text-align: center;
    }
    #pdf-bar button { background: var(--success); }
  </style>
</head>
<body>
  <header>
    <h1>Angel Investor Pitch Evaluator</h1>
    <div><span class="status-dot" id="status-dot"></span><span id="status-text">Checking...</span></div>
  </header>

  <div id="setup-panel">
    <h2>Setup Required</h2>
    <p id="setup-msg">Checking Claude Code installation...</p>
    <div class="install-cmd" id="install-cmd" style="display:none"></div>
    <button onclick="checkStatus()">Retry</button>
  </div>

  <div id="start-panel">
    <h2>Start Evaluation</h2>
    <p style="color:var(--muted);margin-bottom:12px;font-size:14px;">Choose your mode:</p>
    <div class="mode-group">
      <button class="mode-btn" data-mode="sparring" onclick="selectMode(this)">
        <strong>Sparring</strong><span>Raw interrogation. No coaching. Weakest branch first.</span>
      </button>
      <button class="mode-btn" data-mode="coaching" onclick="selectMode(this)">
        <strong>Coaching</strong><span>Challenges + thinking angles when stuck.</span>
      </button>
      <button class="mode-btn active" data-mode="masterclass" onclick="selectMode(this)">
        <strong>Masterclass</strong><span>Full depth. Challenge, coach, and teach.</span>
      </button>
    </div>
    <textarea id="pitch-input" placeholder="Paste your pitch here, or just describe your idea verbally..."></textarea>
    <button onclick="startSession()" id="start-btn">Start Evaluation</button>
  </div>

  <div id="chat-panel">
    <div class="messages" id="messages"></div>
    <div id="pdf-bar">
      <button onclick="downloadPdf()">Download Investment Memo (PDF)</button>
    </div>
    <div class="input-bar">
      <input type="text" id="chat-input" placeholder="Your answer..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()" id="send-btn">Send</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
